org.gradle.jvmargs=-Xmx4096m -Xss4m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
unityStreamingAssets=**STREAMING_ASSETS**

# Android Resolver Properties Start
android.useAndroidX=true
android.enableJetifier=true
# Android Resolver Properties End

# Cấu hình R8 mới để sửa lỗi Dexing/Kotlin
android.enableR8=true
android.useFullClasspathForDexingTransform=true

**ADDITIONAL_PROPERTIES**

# Sửa lỗi API 34 và loại bỏ xung đột thư viện (Gộp chung vào 1 dòng)
android.suppressUnsupportedCompileSdk=34
android.jetifier.ignorelist=annotation-experimental-1.4.1.aar,annotation-experimental-1.4.0.aar
android.jetifier.ignorelist=annotation-experimental-1.4.0.aar